services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/devin.db
    volumes:
      - ./data:/data
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://app:8000
    volumes:
      - ./web:/web
      - /web/node_modules
    depends_on:
      - app
